<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 10px;
    }
    h3 {
      margin-top: 0;
      color: #10a37f;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #10a37f;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0d8a6a;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>
  <h3>ChatGPT to Google Docs</h3>
  
  <label for="webhookUrl">Google Apps Script Webhook URL:</label>
  <input type="text" id="webhookUrl" placeholder="https://script.google.com/macros/s/.../exec">
  
  <button id="saveBtn">Save & Start Streaming</button>
  <div id="status" class="status">Saved! Live streaming to Google Docs.</div>

  <script src="popup.js"></script>
</body>
</html>
