<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 10px;
    }
    h3 {
      margin-top: 0;
      color: #10a37f;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #10a37f;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #0d8a6a;
    }
    #authBtn {
      background-color: #4285f4;
    }
    #authBtn:hover {
      background-color: #357ae8;
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: green;
      display: none;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h3>ChatGPT to Google Docs</h3>
  
  <label for="clientId">Google Web Client ID:</label>
  <input type="text" id="clientId" placeholder="e.g. 12345678-abc.apps.googleusercontent.com">

  <label for="docId">Google Document ID:</label>
  <input type="text" id="docId" placeholder="e.g. 1JNw2LT...">
  
  <button id="authBtn">1. Authorize with Google</button>
  <button id="saveBtn">2. Save & Start Streaming</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
